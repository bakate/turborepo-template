packages:
  - "apps/*"
  - "packages/*"
  - "tooling/*"

allowBuilds:
  "@scarf/scarf": false
  esbuild: true

# -------------------------------------------------------------------------
# PNPM Catalogs
# -------------------------------------------------------------------------
# Define strict versions for dependencies used across multiple packages.
#
# Referenced in package.json as: "dependency": "catalog:"
#
# Advantages:
# 1. Single Source of Truth: Update version in ONE place for the entire repo.
# 2. Deduplication: Guarantees every package uses the exact same version.
# 3. Consistency: Prevents mismatches between apps/packages.
# -------------------------------------------------------------------------
catalog:
  typescript: ^7.0.2
  zod: 4.4.3
  vite: ^8.1.3
  "@vitejs/plugin-react": ^6.0.3
  "@biomejs/biome": ^2.5.3
  "@types/node": ^26.1.1
  xstate: ^5.32.4
  "@xstate/react": ^6.1.0
  "@faker-js/faker": ^10.5.0

catalogs:
  mantine9:
    "@mantine/carousel": 9.4.1
    "@mantine/charts": 9.4.1
    "@mantine/code-highlight": 9.4.1
    "@mantine/core": 9.4.1
    "@mantine/dates": 9.4.1
    "@mantine/dropzone": 9.4.1
    "@mantine/form": 9.4.1
    "@mantine/hooks": 9.4.1
    "@mantine/modals": 9.4.1
    "@mantine/notifications": 9.4.1
    "@mantine/nprogress": 9.4.1
    "@mantine/spotlight": 9.4.1
    "@tabler/icons-react": 3.44.0
    dayjs: 1.11.21
    embla-carousel: 8.6.0
    embla-carousel-react: 8.6.0
    highlight.js: 11.11.1
    recharts: 3.9.2

  nest11:
    "@nestjs/common": 11.1.28
    "@nestjs/config": 4.0.4
    "@nestjs/core": 11.1.28
    "@nestjs/mapped-types": 2.1.1
    "@nestjs/platform-express": 11.1.28
    "@nestjs/swagger": 11.4.5
    "@nestjs/throttler": 6.5.0
    "@scalar/nestjs-api-reference": 1.2.9
    helmet: 8.2.0
    reflect-metadata: 0.2.2
    rxjs: 7.8.2
    tsx: 4.23.0

  react19:
    react: 19.2.7
    react-dom: 19.2.7
    "@types/react": ^19.2.0
    "@types/react-dom": ^19.2.0

  vitest3:
    "vitest": 4.1.10
    "@vitest/coverage-istanbul": 4.1.10
    "@vitest/coverage-v8": 4.1.10
    "@vitest/ui": 4.1.10

onlyBuiltDependencies:
  - "@biomejs/biome"
  - esbuild
